<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurea Pratas — Catálogo</title>
  <meta name="description" content="Catálogo de pratas Aurea Pratas. Anéis, colares, brincos e pulseiras." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="assets/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg" />
  <link rel="shortcut icon" href="assets/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Aurea Pratas" />
  <link rel="manifest" href="assets/favicon/site.webmanifest" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <img src="assets/logo-dark.png" alt="Aurea Pratas" class="logo-img">
      </a>
      <button class="cart-btn" id="cartOpenBtn" aria-label="Abrir carrinho">
        <!-- ícone sacola -->
        <svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span>Minha lista</span>
        <span class="cart-count hidden" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <!-- ── HERO ── -->
  <section class="hero">
    <p class="hero-eyebrow">Coleção Atual</p>
    <h1 class="hero-title">Pratas que <em>brilham</em><br>no seu dia a dia</h1>
    <p class="hero-desc">Escolha suas peças favoritas e envie o pedido direto no WhatsApp.</p>
    <div class="hero-divider"></div>
  </section>

  <!-- ── BUSCA E FILTROS ── -->
  <div class="collection-controls">
    <div class="search-container">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="O que você está procurando?" 
               style="width:100%; padding:14px 20px; border-radius:100px; border:1px solid var(--gray-light); background:var(--white); font-size:14px; box-shadow:var(--shadow);" />
      </div>
    </div>
    <div class="filters-wrap">
      <div class="filters" id="filtersContainer">
        <button class="filter-btn active" data-cat="todos">Todos</button>
        <!-- Categorias carregadas via JS -->
      </div>
    </div>
  </div>

  <!-- ── GRID DE PRODUTOS ── -->
  <main class="catalog-wrap">
    <div class="catalog-grid" id="catalogGrid">
      <!-- Produtos carregados via JS -->
      <div class="empty-state" id="loadingState">
        <p>Carregando peças...</p>
      </div>
    </div>
  </main>

  <!-- ── FOOTER ── -->
  <footer class="site-footer">
    <img src="assets/logo-dark.png" alt="Aurea Pratas" class="footer-logo-img">
    <div class="footer-sub">Joias em Prata com amor ✦</div>
  </footer>

  <!-- ── OVERLAY DO CARRINHO ── -->
  <div class="cart-overlay" id="cartOverlay"></div>

  <!-- ── DRAWER DO CARRINHO ── -->
  <aside class="cart-drawer" id="cartDrawer" aria-label="Carrinho de seleção">
    <div class="cart-header">
      <h2>Minha Lista</h2>
      <button class="cart-close-btn" id="cartCloseBtn" aria-label="Fechar">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="cart-items" id="cartItems">
      <!-- Itens injetados via JS -->
    </div>

    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-total">
        <span>Total estimado</span>
        <span class="cart-total-value" id="cartTotal">R$ 0,00</span>
      </div>
      <button class="whatsapp-btn" id="whatsappBtn">
        <!-- ícone WhatsApp -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Finalizar pedido no WhatsApp
      </button>
    </div>
  </aside>

  <!-- ── TOAST ── -->
  <div class="toast" id="toast"></div>

  <!-- ── MODAL DE PRODUTO ── -->
  <div class="modal-overlay" id="productModal">
    <div class="modal-content">
      <div class="modal-close" id="modalClose" aria-label="Fechar">&times;</div>
      <div class="modal-gallery" id="modalGallery">
        <!-- Imagens injetadas via JS -->
      </div>
      <div class="modal-info">
        <div class="modal-cat" id="modalCat"></div>
        <h2 class="modal-name" id="modalName"></h2>
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-desc" id="modalDesc"></div>
      </div>
    </div>
  </div>

  <!-- ── BARRA FLUTUANTE DO CARRINHO ── -->
  <div class="cart-floating-bar hidden" id="cartFloatingBar" onclick="abrirCarrinho()">
    <div class="cart-floating-info">
      <span class="cart-floating-icon">🛒</span>
      <span id="cartFloatingQty">0 peças</span>
      <span class="cart-floating-divider"></span>
      <span id="cartFloatingTotal">R$ 0,00</span>
    </div>
    <button class="cart-floating-btn">REVISAR LISTA</button>
  </div>

  <!-- ── SCRIPTS ── -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/catalogo.js"></script>
</body>
</html>
